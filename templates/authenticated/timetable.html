{% extends "authenticated/authenticated_base.html" %}

{% block app_content %}
<div class="scheduler-container">
    <h2>Your Timetable</h2>
    <div class="timeline-vessel">
        {% for Slot in Schedule %}
        <div class="timeline-block" style="flex-grow: {{ Slot.Duration }};">
            <div class="block-info">
                <span class="subject-title">{{ Slot.SubjectName }}</span>
                <span class="time-range">{{ Slot.Start }} - {{ Slot.End }}</span>
            </div>
            <div class="duration-tag">{{ Slot.Duration }} mins</div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .timeline-vessel {
        display: flex;
        flex-direction: column;
        height: 70vh; /* Takes up most of the screen */
        border: 2px solid #502b5f;
        border-radius: 12px;
        overflow: hidden;
        background: #eee;
    }

    .timeline-block {
        margin: 2px;
        background: #9b052c;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
        transition: transform 0.2s;
        border-radius: 4px;
    }

    .timeline-block:hover {
        transform: scale(1.01);
        filter: brightness(1.2);
    }

    .subject-title { font-weight: bold; font-size: 1.2rem; }
    .duration-tag { opacity: 0.7; font-family: monospace; }
</style>
{% endblock %}
